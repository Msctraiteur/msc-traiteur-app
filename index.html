<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>MSC Traiteur — App V3</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--accent:#111827;--danger:#991b1b;--soft:#f3f4f6}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{padding:16px 20px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
h1,h2,h3{margin:0}.sub{color:var(--muted);font-size:14px;margin-top:4px}.wrap{max-width:1320px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}.tab.active{background:var(--accent);color:#fff}
.grid{display:grid;gap:16px}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}.metric{font-size:28px;font-weight:700}.muted{color:var(--muted)}.small{font-size:12px}.soft{background:var(--soft);padding:10px;border-radius:12px}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}
input,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff}textarea{min-height:90px;resize:vertical}
.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.row4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.btn{border:0;background:var(--accent);color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.danger{background:var(--danger)}
.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}.divider{height:1px;background:var(--line);margin:12px 0}
.recipe-line{display:grid;grid-template-columns:2fr 1fr 90px;gap:8px;align-items:center;margin-bottom:8px}
.suggestions{max-height:160px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}.suggestion{padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}.suggestion:last-child{border-bottom:0}.suggestion:hover{background:#f9fafb}
@media (max-width:980px){.g4,.g3,.g2,.row,.row3,.row4,.recipe-line{grid-template-columns:1fr}}
</style>
<script src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js'></script>
</head><body>
<header><div class='wrap' style='padding:0'><h1>MSC Traiteur — App V3</h1><div class='sub'>Ajout V3 : création de recettes avec recherche d’ingrédients, sélection ligne par ligne et calcul immédiat.</div></div></header>
<div class='wrap'><div class='tabs' id='tabs'></div><div id='view'></div></div>
<script>
const storageKey='msc-traiteur-app-v3';
const defaults={
ingredients:[
{id:1,name:'Poulet',aliases:['poulet fermier','filet de poulet','escalope poulet'],category:'Viande',unit:'kg',supplier:'Metro',purchasePrice:8.5,stock:12,threshold:8,allergen:'',nutrition:''},
{id:2,name:'Poivrons',aliases:['poivron rouge','poivron vert','poivrons'],category:'Légumes',unit:'kg',supplier:'Primeur',purchasePrice:4.2,stock:8,threshold:6,allergen:'',nutrition:''},
{id:3,name:'Crème',aliases:['creme liquide','creme'],category:'Crémerie',unit:'L',supplier:'Metro',purchasePrice:3.4,stock:10,threshold:4,allergen:'Lait',nutrition:''},
{id:4,name:'Riz basmati',aliases:['riz'],category:'Épicerie',unit:'kg',supplier:'Metro',purchasePrice:2.1,stock:18,threshold:5,allergen:'',nutrition:''},
{id:5,name:'Mozzarella râpée',aliases:['mozzarella rapee','mozzarella'],category:'Crémerie',unit:'kg',supplier:'Metro',purchasePrice:8.9,stock:6,threshold:5,allergen:'Lait',nutrition:''},
{id:6,name:'Pain de mie',aliases:['pain de mie traiteur','pain mie'],category:'Boulangerie',unit:'kg',supplier:'Metro',purchasePrice:4.8,stock:14,threshold:5,allergen:'Gluten',nutrition:''},
{id:7,name:'Jambon blanc',aliases:['jambon cuit','jambon'],category:'Charcuterie',unit:'kg',supplier:'Metro',purchasePrice:9.5,stock:7,threshold:4,allergen:'',nutrition:''}
],
recipes:[
{id:101,name:'Poulet basquaise',family:'Plat',basePortions:10,sellingPrice:8.9,procedure:'Saisir le poulet, suer les légumes, mijoter puis dresser avec le riz.',ingredients:[{ingredientId:1,qty:2.2},{ingredientId:2,qty:1.5},{ingredientId:3,qty:0.3},{ingredientId:4,qty:1.1}]},
{id:102,name:'Croque jambon fromage',family:'Snacking',basePortions:1,sellingPrice:4.8,procedure:'Monter, garnir, cuire et conditionner.',ingredients:[{ingredientId:5,qty:0.05},{ingredientId:6,qty:0.1},{ingredientId:7,qty:0.04}]}
],
events:[{id:1001,title:'Mariage Château d’Arche',date:'2026-06-20',client:'Julie & Louis',location:'Sauternes',guests:130,status:'Confirmé',logistics:'Service sur place',menu:[{recipeId:101,portions:130},{recipeId:102,portions:40}]}],
priceHistory:[]
};
let db=JSON.parse(localStorage.getItem(storageKey)||'null')||structuredClone(defaults);
let currentTab='recipes';
let currentImportRows=[];
let recipeBuilderLines=[{ingredientId:null,search:'',qty:''}];
function save(){localStorage.setItem(storageKey,JSON.stringify(db));render()}
function euro(v){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(Number(v||0))}
function fmtDate(v){return v?new Intl.DateTimeFormat('fr-FR').format(new Date(v)):'-'}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1}
function val(id){return document.getElementById(id)?.value||''}
function normalize(str){return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function guessUnitFromText(s){const t=normalize(s); if(/\bkg\b|\bkilo\b/.test(t)) return 'kg'; if(/\bl\b|\blitre\b/.test(t)) return 'L'; if(/\bg\b|\bgram/.test(t)) return 'g'; return 'kg';}
function ingredientSearch(term){const q=normalize(term); if(!q) return db.ingredients.slice(0,12).map(ing=>({ing,score:0})); return db.ingredients.map(ing=>{const pool=[ing.name,...(ing.aliases||[])].map(normalize); let score=0; pool.forEach(name=>{if(name===q) score=Math.max(score,100); else if(name.includes(q)||q.includes(name)) score=Math.max(score,85); else {const qw=q.split(' ').filter(Boolean), nw=name.split(' ').filter(Boolean); const overlap=qw.filter(w=>nw.includes(w)).length; score=Math.max(score, overlap*15);}}); return {ing,score};}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||a.ing.name.localeCompare(b.ing.name)).slice(0,12)}
function recipeStats(recipe){const rows=recipe.ingredients.map(it=>{const ing=db.ingredients.find(x=>x.id===Number(it.ingredientId))||{}; const total=(Number(ing.purchasePrice)||0)*Number(it.qty||0); return {...it,name:ing.name||'?',unit:ing.unit||'',allergen:ing.allergen||'',total};}); const totalCost=rows.reduce((s,r)=>s+r.total,0); const costPerPortion=recipe.basePortions?totalCost/recipe.basePortions:0; const foodCost=recipe.sellingPrice?(costPerPortion/recipe.sellingPrice)*100:0; return {rows,totalCost,costPerPortion,foodCost,allergens:[...new Set(rows.map(r=>r.allergen).filter(Boolean))]};}
function eventStats(ev){let sales=0,cost=0; const needs=new Map(); ev.menu.forEach(m=>{const recipe=db.recipes.find(r=>r.id===Number(m.recipeId)); if(!recipe) return; const st=recipeStats(recipe); const ratio=m.portions/recipe.basePortions; sales+=recipe.sellingPrice*m.portions; cost+=st.costPerPortion*m.portions; recipe.ingredients.forEach(ri=>{const ing=db.ingredients.find(i=>i.id===Number(ri.ingredientId)); if(!ing) return; const needed=Number(ri.qty)*ratio; const prev=needs.get(ing.id)||{...ing,needed:0}; prev.needed+=needed; needs.set(ing.id,prev);});}); return {sales,cost,foodCost:sales?cost/sales*100:0,items:[...needs.values()].map(i=>({...i,toBuy:Math.max(i.needed-i.stock,0)}))};}
function tabs(){const items=[['dashboard','Tableau de bord'],['ingredients','Ingrédients'],['recipes','Recettes V3'],['events','Prestations'],['shopping','Achats'],['supplierImport','Import fournisseur']]; document.getElementById('tabs').innerHTML=items.map(([k,l])=>`<button class="tab ${currentTab===k?'active':''}" onclick="currentTab='${k}';render()">${l}</button>`).join('')}
function renderDashboard(){const low=db.ingredients.filter(i=>Number(i.stock)<=Number(i.threshold)).length; const stockValue=db.ingredients.reduce((s,i)=>s+Number(i.stock)*Number(i.purchasePrice),0); const avgFood=db.recipes.length?db.recipes.reduce((s,r)=>s+recipeStats(r).foodCost,0)/db.recipes.length:0; return `<div class="grid g4"><div class="card"><div class="muted">Food cost moyen</div><div class="metric">${avgFood.toFixed(1)}%</div></div><div class="card"><div class="muted">Stocks à surveiller</div><div class="metric">${low}</div></div><div class="card"><div class="muted">Valeur du stock</div><div class="metric">${euro(stockValue)}</div></div><div class="card"><div class="muted">Recettes</div><div class="metric">${db.recipes.length}</div></div></div>`}
function renderIngredients(){return `<div class="grid g2"><div class="card"><div class="section-title"><h3>Base ingrédients</h3><button class="btn secondary" onclick="resetData()">Réinitialiser</button></div><table><thead><tr><th>Nom</th><th>Alias</th><th>Prix</th><th>Stock</th></tr></thead><tbody>${db.ingredients.map(i=>`<tr><td>${i.name}<div class="muted">${i.category} · ${i.unit}</div></td><td class="small muted">${(i.aliases||[]).join(', ')}</td><td>${euro(i.purchasePrice)}</td><td>${i.stock} ${i.unit}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Ajouter un ingrédient</h3><div class="row"><div><label>Nom</label><input id="ing_name"></div><div><label>Catégorie</label><input id="ing_cat"></div></div><div class="row4" style="margin-top:10px"><div><label>Unité</label><input id="ing_unit" value="kg"></div><div><label>Fournisseur</label><input id="ing_sup"></div><div><label>Prix</label><input id="ing_price" type="number" step="0.01"></div><div><label>Stock</label><input id="ing_stock" type="number" step="0.01"></div></div><div class="row"><div><label>Alias (virgules)</label><input id="ing_aliases"></div><div><label>Allergène</label><input id="ing_allergen"></div></div><div style="margin-top:12px"><button class="btn" onclick="addIngredient()">Ajouter</button></div></div></div>`}
function previewBuilder(){const items=recipeBuilderLines.filter(l=>l.ingredientId&&Number(l.qty)>0); const rows=items.map(l=>{const ing=db.ingredients.find(i=>i.id===Number(l.ingredientId)); if(!ing) return null; return {name:ing.name,qty:Number(l.qty),unit:ing.unit,total:Number(ing.purchasePrice)*Number(l.qty),allergen:ing.allergen||''};}).filter(Boolean); const totalCost=rows.reduce((s,r)=>s+r.total,0); const portions=Number(val('rec_portions')||10)||10; return {totalCost,costPerPortion:portions?totalCost/portions:0,allergens:[...new Set(rows.map(r=>r.allergen).filter(Boolean))]};}
function renderRecipeLine(line, idx){const suggestions=ingredientSearch(line.search); const selected=line.ingredientId?db.ingredients.find(i=>i.id===line.ingredientId):null; return `<div class="card" style="padding:10px;margin-bottom:10px"><div class="recipe-line"><div><label>Ingrédient</label><input value="${String(line.search||'').replace(/"/g,'&quot;')}" oninput="updateRecipeLineSearch(${idx}, this.value)" placeholder="Tape : poulet, crème, riz..."></div><div><label>Quantité</label><input type="number" step="0.001" value="${line.qty}" oninput="updateRecipeLineQty(${idx}, this.value)"></div><div style="align-self:end"><button class="btn danger" onclick="removeRecipeLine(${idx})">Suppr.</button></div></div>${selected?`<div class="small">Sélectionné : <strong>${selected.name}</strong> · ${selected.unit} · ${euro(selected.purchasePrice)}/${selected.unit}</div>`:''}<div class="suggestions" style="margin-top:8px">${suggestions.map(s=>`<div class="suggestion" onclick="selectIngredientForLine(${idx}, ${s.ing.id})"><strong>${s.ing.name}</strong> <span class="muted small">· ${s.ing.unit} · ${euro(s.ing.purchasePrice)}</span><div class="small muted">${(s.ing.aliases||[]).join(', ')}</div></div>`).join('') || '<div class="suggestion muted">Aucune suggestion</div>'}</div></div>`}
function renderRecipes(){const selected=db.recipes[0]; const p=previewBuilder(); return `<div class="grid g2"><div class="card"><h3>Recettes existantes</h3><table><thead><tr><th>Nom</th><th>Famille</th><th>Coût/portion</th><th>Food cost</th></tr></thead><tbody>${db.recipes.map(r=>{const s=recipeStats(r); return `<tr><td>${r.name}</td><td>${r.family}</td><td>${euro(s.costPerPortion)}</td><td>${s.foodCost.toFixed(1)}%</td></tr>`}).join('')}</tbody></table></div><div class="card"><h3>Créer une recette — V3</h3><div class="soft small">Ajout ligne par ligne avec recherche automatique. Plus besoin de codes.</div><div class="row" style="margin-top:10px"><div><label>Nom</label><input id="rec_name"></div><div><label>Famille</label><input id="rec_family" value="Plat"></div></div><div class="row3" style="margin-top:10px"><div><label>Portions de base</label><input id="rec_portions" type="number" value="10" oninput="render()"></div><div><label>Prix vente / portion</label><input id="rec_price" type="number" step="0.01"></div><div><label>Procédure</label><input id="rec_proc"></div></div><div class="divider"></div><div class="section-title"><h3 style="font-size:16px">Composition</h3><button class="btn secondary" onclick="addRecipeLine()">Ajouter une ligne</button></div>${recipeBuilderLines.map((line,idx)=>renderRecipeLine(line,idx)).join('')}<div class="divider"></div><div class="soft"><div><strong>Prévisualisation coût recette</strong></div><div class="small muted" style="margin-top:6px">Coût total : ${euro(p.totalCost)} · Coût / portion : ${euro(p.costPerPortion)} · Allergènes : ${p.allergens.join(', ') || 'Aucun'}</div></div><div style="margin-top:12px"><button class="btn" onclick="createRecipeV3()">Créer la recette</button></div></div></div><div class="card" style="margin-top:16px"><h3>Exemple détaillé</h3><div><strong>${selected.name}</strong></div><table style="margin-top:10px"><thead><tr><th>Ingrédient</th><th>Qté</th><th>Coût</th></tr></thead><tbody>${recipeStats(selected).rows.map(r=>`<tr><td>${r.name}</td><td>${r.qty} ${r.unit}</td><td>${euro(r.total)}</td></tr>`).join('')}</tbody></table></div>`}
function renderEvents(){const ev=db.events[0], st=eventStats(ev); return `<div class="card"><h3>Prestations</h3><table><thead><tr><th>Événement</th><th>Date</th><th>Client</th><th>CA</th><th>Food cost</th></tr></thead><tbody>${db.events.map(e=>{const s=eventStats(e); return `<tr><td>${e.title}</td><td>${fmtDate(e.date)}</td><td>${e.client}</td><td>${euro(s.sales)}</td><td>${s.foodCost.toFixed(1)}%</td></tr>`}).join('')}</tbody></table><div class="soft small" style="margin-top:12px">Exemple : ${ev.title} · Coût matière ${euro(st.cost)} · À acheter ${st.items.filter(i=>i.toBuy>0).length} ligne(s)</div></div>`}
function renderShopping(){const st=eventStats(db.events[0]); return `<div class="card"><div class="section-title"><h3>Liste d'achats</h3><button class="btn secondary" onclick="window.print()">Imprimer</button></div><table><thead><tr><th>Ingrédient</th><th>Besoin</th><th>Stock</th><th>À acheter</th></tr></thead><tbody>${st.items.map(i=>`<tr><td>${i.name}</td><td>${i.needed.toFixed(2)} ${i.unit}</td><td>${i.stock} ${i.unit}</td><td>${i.toBuy>0?i.toBuy.toFixed(2)+' '+i.unit:'OK'}</td></tr>`).join('')}</tbody></table></div>`}
function parseNumberFR(s){if(!s) return 0; return Number(String(s).replace(/\s/g,'').replace(/\./g,'').replace(',', '.')) || 0}
function parseInvoiceText(text){const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean); const rows=[]; for(const line of lines){const clean=line.replace(/\s+/g,' ').trim(); const m=clean.match(/^(.+?)\s+(\d+(?:[.,]\d+)?)\s*(kg|g|l|L)?\s+(\d+(?:[.,]\d+)?)$/i); if(m){const rawName=m[1].trim(), qty=parseNumberFR(m[2]), unit=m[3]||guessUnitFromText(clean), total=parseNumberFR(m[4]), unitPrice=qty?total/qty:total; rows.push({rawName, qty, unit, unitPrice});}} return rows}
function bestIngredientMatch(rawName){const q=normalize(rawName); let best=null,bestScore=0; db.ingredients.forEach(ing=>{[ing.name,...(ing.aliases||[])].map(normalize).forEach(name=>{let score=0; if(name===q) score=100; else if(name.includes(q)||q.includes(name)) score=85; else {const qw=q.split(' ').filter(Boolean), nw=name.split(' ').filter(Boolean); score=qw.filter(w=>nw.includes(w)).length*15;} if(score>bestScore){bestScore=score; best=ing;}})}); return {ingredient:best, score:bestScore}}
function processImportText(text){const rows=parseInvoiceText(text); currentImportRows=rows.map(r=>{const m=bestIngredientMatch(r.rawName); return {...r, matchId:m.ingredient?m.ingredient.id:null, matchName:m.ingredient?m.ingredient.name:''};}); currentTab='supplierImport'; render();}
async function extractPdfText(file){const arrayBuffer=await file.arrayBuffer(); pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.js'; const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise; let text=''; for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p); const content=await page.getTextContent(); text+=content.items.map(i=>i.str).join(' ')+'\n';} return text}
async function handleFileImport(){const file=document.getElementById('imp_file').files[0]; if(!file) return alert('Choisis un fichier.'); const ext=file.name.toLowerCase().split('.').pop(); if(ext==='pdf') processImportText(await extractPdfText(file)); else processImportText(await file.text())}
function parsePastedText(){const text=val('imp_text'); if(!text.trim()) return alert('Colle un texte.'); processImportText(text)}
function sampleImport(){processImportText('POULET FERMIER 5 KG 42,00\nMOZZARELLA RAPEE 2 KG 17,80\nPAIN DE MIE TRAITEUR 3 KG 14,40')}
function clearPreview(){currentImportRows=[]; render();}
function applyImport(updateStock){currentImportRows.forEach(row=>{let ing=row.matchId?db.ingredients.find(i=>i.id===row.matchId):null; if(!ing){db.ingredients.push({id:nextId(db.ingredients),name:row.rawName,aliases:[row.rawName],category:'À classer',unit:row.unit||'kg',supplier:'Metro',purchasePrice:Number(row.unitPrice||0),stock:updateStock?Number(row.qty||0):0,threshold:0,allergen:'',nutrition:''}); return;} const oldPrice=Number(ing.purchasePrice||0), newPrice=Number(row.unitPrice||oldPrice); if(newPrice>0 && Math.abs(newPrice-oldPrice)>0.0001){db.priceHistory.push({id:nextId(db.priceHistory),date:new Date().toISOString().slice(0,10),ingredient:ing.name,oldPrice,newPrice,source:'Metro'}); ing.purchasePrice=newPrice;} if(updateStock && Number(row.qty||0)>0) ing.stock=Number(ing.stock||0)+Number(row.qty||0);}); currentImportRows=[]; save(); alert('Import appliqué.');}
function renderSupplierImport(){return `<div class="grid g2"><div class="card"><h3>Import fournisseur</h3><div class="soft small">PDF, CSV, TXT. Pour les PDF scannés, colle le texte.</div><div style="margin-top:10px"><label>Fichier</label><input id="imp_file" type="file" accept=".pdf,.csv,.txt"></div><div class="row" style="margin-top:10px"><button class="btn" onclick="handleFileImport()">Analyser</button><button class="btn secondary" onclick="sampleImport()">Exemple Metro</button></div><div style="margin-top:10px"><label>Texte collé</label><textarea id="imp_text"></textarea></div><div class="row" style="margin-top:10px"><button class="btn secondary" onclick="parsePastedText()">Analyser texte</button><button class="btn secondary" onclick="clearPreview()">Effacer</button></div></div><div class="card"><h3>Prévisualisation</h3><table><thead><tr><th>Ligne</th><th>Correspondance</th><th>Qté</th><th>PU HT</th></tr></thead><tbody>${currentImportRows.map(r=>`<tr><td>${r.rawName}</td><td>${r.matchName || 'Aucune'}</td><td>${r.qty || ''} ${r.unit || ''}</td><td>${euro(r.unitPrice || 0)}</td></tr>`).join('') || '<tr><td colspan="4" class="muted">Aucune ligne analysée</td></tr>'}</tbody></table><div class="row" style="margin-top:10px"><button class="btn secondary" onclick="applyImport(false)">Appliquer sans stock</button><button class="btn" onclick="applyImport(true)">Appliquer + stock</button></div></div></div>`}
function addIngredient(){db.ingredients.push({id:nextId(db.ingredients),name:val('ing_name'),aliases:val('ing_aliases').split(',').map(s=>s.trim()).filter(Boolean),category:val('ing_cat'),unit:val('ing_unit')||'kg',supplier:val('ing_sup'),purchasePrice:Number(val('ing_price')||0),stock:Number(val('ing_stock')||0),threshold:0,allergen:val('ing_allergen'),nutrition:''}); save();}
function addRecipeLine(){recipeBuilderLines.push({ingredientId:null,search:'',qty:''}); render();}
function removeRecipeLine(idx){recipeBuilderLines.splice(idx,1); if(!recipeBuilderLines.length) recipeBuilderLines=[{ingredientId:null,search:'',qty:''}]; render();}
function updateRecipeLineSearch(idx,v){recipeBuilderLines[idx].search=v; recipeBuilderLines[idx].ingredientId=null; render();}
function updateRecipeLineQty(idx,v){recipeBuilderLines[idx].qty=v; render();}
function selectIngredientForLine(idx,id){const ing=db.ingredients.find(i=>i.id===id); recipeBuilderLines[idx].ingredientId=id; recipeBuilderLines[idx].search=ing?ing.name:recipeBuilderLines[idx].search; render();}
function createRecipeV3(){const name=val('rec_name').trim(); if(!name) return alert('Ajoute un nom de recette.'); const ingredients=recipeBuilderLines.filter(l=>l.ingredientId&&Number(l.qty)>0).map(l=>({ingredientId:Number(l.ingredientId),qty:Number(l.qty)})); if(!ingredients.length) return alert('Ajoute au moins un ingrédient.'); db.recipes.push({id:nextId(db.recipes),name,family:val('rec_family')||'Plat',basePortions:Number(val('rec_portions')||1),sellingPrice:Number(val('rec_price')||0),procedure:val('rec_proc'),ingredients}); recipeBuilderLines=[{ingredientId:null,search:'',qty:''}]; save(); alert('Recette créée.');}
function resetData(){if(confirm('Réinitialiser les données V3 ?')){db=structuredClone(defaults); recipeBuilderLines=[{ingredientId:null,search:'',qty:''}]; currentImportRows=[]; save();}}
function render(){tabs(); const view=document.getElementById('view'); if(currentTab==='dashboard') view.innerHTML=renderDashboard(); if(currentTab==='ingredients') view.innerHTML=renderIngredients(); if(currentTab==='recipes') view.innerHTML=renderRecipes(); if(currentTab==='events') view.innerHTML=renderEvents(); if(currentTab==='shopping') view.innerHTML=renderShopping(); if(currentTab==='supplierImport') view.innerHTML=renderSupplierImport();}
render();
</script></body></html>
